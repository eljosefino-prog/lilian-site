<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lilian</title>
    <meta
      name="description"
      content="Lilian diseña y ejecuta sistemas de crecimiento comercial."
    />
    <style>
      :root {
        --bg: #f6f8fc;
        --text: #0f172a;
        --blue: #2557d6;
        --line: rgba(148, 163, 184, 0.7);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
      }

      .page {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 30%),
          radial-gradient(circle at bottom, rgba(15, 23, 42, 0.04), transparent 42%),
          linear-gradient(to bottom, rgba(246, 248, 252, 0.82), rgba(246, 248, 252, 0.96));
      }

      .page::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.028;
        background-image:
          linear-gradient(rgba(15, 23, 42, 0.4) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.4) 1px, transparent 1px);
        background-size: 88px 88px;
        pointer-events: none;
      }

      .glow {
        position: absolute;
        left: 50%;
        top: 16%;
        width: min(22rem, 70vw);
        height: min(22rem, 70vw);
        transform: translateX(-50%);
        border-radius: 9999px;
        background: rgba(37, 87, 214, 0.1);
        filter: blur(48px);
        pointer-events: none;
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(100%, 1200px);
        min-height: calc(100vh - 48px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .center {
        flex: 1;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .logo-wrap {
        margin-bottom: 10px;
      }

      .logo {
        width: min(680px, 90vw);
        height: auto;
        display: block;
      }

      .footer {
        padding-bottom: 80px;
        text-align: center;
      }

      .footer-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .mantra {
        margin: 0;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        font-size: clamp(16px, 1.6vw, 20px);
      }

      .divider {
        width: 96px;
        height: 1px;
        background: var(--line);
      }

      .email {
        margin: 0;
        color: rgba(100, 116, 139, 0.9);
        letter-spacing: 0.08em;
        font-size: clamp(14px, 1.2vw, 18px);
      }

      @media (max-width: 768px) {
        .logo-wrap {
          margin-bottom: 0;
        }

        .footer {
          padding-bottom: 56px;
        }

        .footer-inner {
          gap: 18px;
        }

        .mantra {
          letter-spacing: 0.22em;
          line-height: 1.5;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="glow"></div>

      <div class="shell">
        <section class="center">
          <div class="logo-wrap">
            <svg
              viewBox="0 0 820 180"
              class="logo"
              aria-label="Lilian"
              role="img"
            >
              <text
                x="50%"
                y="50%"
                dominant-baseline="middle"
                text-anchor="middle"
                fill="#2557D6"
                font-size="132"
                font-weight="500"
                style="font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; text-rendering: geometricPrecision; font-kerning: normal;"
              >
                Lilian
              </text>
            </svg>
          </div>
        </section>

        <footer class="footer">
          <div class="footer-inner">
            <p class="mantra">Ordena - Ejecuta - Crece</p>
            <div class="divider"></div>
            <p class="email">contacto@lilian.cl</p>
          </div>
        </footer>
      </div>
    </main>
  </body>
</html>
